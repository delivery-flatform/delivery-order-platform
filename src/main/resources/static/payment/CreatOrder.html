<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <script src="https://js.tosspayments.com/v2/standard"></script>
    <style>
        /* 기존 스타일과 동일 */
        .container {
            max-width: 500px;
            margin: 30px auto;
            padding: 25px;
            border: 1px solid #e5e8eb;
            border-radius: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #191f28;
        }

        label {
            display: block;
            font-size: 14px;
            color: #4e5968;
            margin-bottom: 4px;
            margin-top: 12px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d6db;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .info-text {
            font-size: 12px;
            color: #8b95a1;
            margin-bottom: 8px;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }

        #payment-button {
            background-color: #3182f6;
            color: white;
        }

        #payment-button:hover {
            background-color: #1b64da;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>배달 주문 결제</h2>

    <label for="userId">고객 이름</label>
    <input type="text" id="userId" value="맹시훈 맹시훈">

    <label for="storeName">가게 이름</label>
    <input type="text" id="storeName" value="콩나물국밥">

    <label for="product_names">상품 및 수량 선택</label>
    <p class="info-text">예: 돼지고기 김치찌개:1, 계란말이:2 (쉼표 구분)</p>
    <input type="text" id="product_names" value="콩나물국밥:2">

    <label for="token">인증 토큰 (Apidog에서 복사한 Bearer 토큰 값)</label>
    <input type="text" id="token" placeholder="eyJhbGciOiJIUzI1NiJ9...">

    <button id="payment-button">주문 생성 및 결제하기</button>
</div>

<script>
    const clientKey = "test_ck_LkKEypNArWdY7WDaQRoQ8lmeaxYG";
    const tossPayments = TossPayments(clientKey);

    document.getElementById("payment-button").addEventListener("click", async () => {
        const token = document.getElementById("token").value.trim();

        if (!token) {
            return alert("Apidog에서 발급받은 인증 토큰을 입력해주세요.");
        }

        const storeName = document.getElementById("storeName").value;
        const productNameInput = document.getElementById("product_names").value;

        if (!storeName) return alert("가게 이름을 입력해주세요.");

        const parsedItems = productNameInput.split(',').map(item => {
            const [name, quantity] = item.split(':').map(s => s.trim());
            return {name: name, quantity: parseInt(quantity) || 1};
        });

        const orderRequestDto = {
            storeName: storeName,
            address: "서울시 강남구 역삼동 101",
            comment: "문 앞에 두고 벨 눌러주세요.",
            productNameList: parsedItems.map(item => item.name),
            products: parsedItems.map(item => ({
                productId: null,
                quantity: item.quantity
            }))
        };

        try {
            // 주문 생성 API 호출
            const preOrderResponse = await fetch(`/api/v1/orders/order`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // 사용자가 입력한 토큰을 헤더에 실어서 보냅니다.
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(orderRequestDto)
            });

            const result = await preOrderResponse.json();
            if (!preOrderResponse.ok) throw new Error(result.message || "주문 생성 실패");

            const {orderId, totalPrice} = result.data;
            const orderName = parsedItems.length > 1
                ? `${parsedItems[0].name} 외 ${parsedItems.length - 1}건`
                : parsedItems[0].name;

            const payment = tossPayments.payment({
                customerKey: "user_" + Math.random().toString(36).substring(2, 10),
            });

            // 토스 결제 창 띄우기
            await payment.requestPayment({
                method: "CARD",
                amount: {currency: "KRW", value: totalPrice},
                orderId: orderId,
                orderName: orderName,
                successUrl: `${window.location.origin}/payment/success.html`,
                failUrl: `${window.location.origin}/payment/fail.html`
            });

        } catch (error) {
            console.error(error);
            alert("에러 발생: " + error.message);
        }
    });
</script>
</body>
</html>
