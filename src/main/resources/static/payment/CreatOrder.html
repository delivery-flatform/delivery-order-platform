<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <script src="https://js.tosspayments.com/v2/standard"></script>
    <style>
        .container {
            max-width: 500px;
            margin: 30px auto;
            padding: 25px;
            border: 1px solid #e5e8eb;
            border-radius: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #191f28;
        }

        label {
            display: block;
            font-size: 14px;
            color: #4e5968;
            margin-bottom: 4px;
            margin-top: 12px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d6db;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .info-text {
            font-size: 12px;
            color: #8b95a1;
            margin-bottom: 8px;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }

        #payment-button {
            background-color: #3182f6;
            color: white;
        }

        #payment-button:hover {
            background-color: #1b64da;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>배달 주문 결제 (사전 생성 방식)</h2>

    <label for="userId">고객 이름 (DB username)</label>
    <input type="text" id="userId" value="갈형준@갈형준">

    <label for="product_names">상품 리스트</label>
    <p class="info-text">여러 상품은 쉼표(,)로 구분해 주세요.</p>
    <input type="text" id="product_names" value="돼지고기 김치찌개, 계란말이">

    <label for="amount">최종 결제 금액 (검증용)</label>
    <input type="number" id="amount" value="16000">

    <button id="payment-button">결제하기</button>
</div>

<script>
    const clientKey = "test_ck_LkKEypNArWdY7WDaQRoQ8lmeaxYG";
    const tossPayments = TossPayments(clientKey);

    document.getElementById("payment-button").addEventListener("click", async () => {
        const userId = document.getElementById("userId").value;
        const productNameInput = document.getElementById("product_names").value;
        const amount = Number(document.getElementById("amount").value);

        // 1. 쉼표로 구분된 문자열을 배열로 변환 (양 끝 공백 제거)
        const productNameList = productNameInput.split(',').map(name => name.trim());

        // 2. 백엔드 DTO 구조에 맞게 데이터 구성
        const orderRequestDto = {
            storeId: "ff0c6de8-1855-11f1-b00b-027838fb21f5",
            address: "서울시 강남구 역삼동 101",
            comment: "문 앞에 두고 벨 눌러주세요.",
            productNameList: productNameList, // List<String> 대응
            amount: amount // 서버 금액 검증용
        };

        try {
            // 3. 백엔드 OrderController에 주문 사전 생성 요청
            // 엔드포인트를 /api/v1/orders로 수정 (이전 답변의 컨트롤러 기준)
            const preOrderResponse = await fetch(`/api/v1/orders/order?userId=${encodeURIComponent(userId)}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(orderRequestDto)
            });

            const result = await preOrderResponse.json();

            if (!preOrderResponse.ok) {
                throw new Error(result.message || "주문 생성에 실패했습니다.");
            }

            // 4. 서버 응답 데이터에서 생성된 주문 UUID 추출
            // ApiResponse<OrderResponseDto> 구조이므로 result.data.id 접근
            const dbOrderId = result.data.orderId;

            // 5. 토스 결제창 띄우기
            const payment = tossPayments.payment({
                customerKey: "user_" + Math.random().toString(36).substring(2, 10),
            });

            await payment.requestPayment({
                method: "CARD",
                amount: {currency: "KRW", value: amount},
                orderId: dbOrderId, // ★ 서버에서 받은 UUID를 그대로 전달 (매우 중요)
                orderName: productNameList.length > 1
                    ? `${productNameList[0]} 외 ${productNameList.length - 1}건`
                    : productNameList[0],
                successUrl: `${window.location.origin}/payment/success.html`,
                failUrl: `${window.location.origin}/payment/fail.html`,
                customerName: userId
            });

        } catch (error) {
            console.error("결제 프로세스 실패:", error);
            alert("에러 발생: " + error.message);
        }
    });
</script>
</body>
</html>
