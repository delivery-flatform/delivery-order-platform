<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <script src="https://js.tosspayments.com/v2/standard"></script>
    <style>
        .container {
            max-width: 500px;
            margin: 30px auto;
            padding: 25px;
            border: 1px solid #e5e8eb;
            border-radius: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #191f28;
        }

        label {
            display: block;
            font-size: 14px;
            color: #4e5968;
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #d1d6db;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #ready-button {
            background-color: #3182f6;
            color: white;
        }

        #ready-button:hover {
            background-color: #1b64da;
        }

        #payment-button {
            background-color: #00d084;
            color: white;
            display: none;
            margin-top: 24px;
        }

        #payment-button:hover {
            background-color: #00b371;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>배달 주문 결제 테스트</h2>

    <label for="userId">고객 고유 ID (테스트)</label>
    <input type="text" id="userId" value="test_user_2026">

    <label for="amount">최종 결제 금액</label>
    <input type="number" id="amount" value="15000">

    <button id="ready-button">결제 수단 선택하기</button>

    <div id="payment-method"></div>
    <div id="agreement"></div>

    <button id="payment-button">결제하기</button>
</div>

<script>
    const clientKey = "test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm";

    let tossPayments = null;
    let widgets = null;

    document.getElementById("ready-button").addEventListener("click", async () => {
        const customerKey = document.getElementById("userId").value;
        const amountValue = Number(document.getElementById("amount").value);

        // 2. SDK 초기화
        tossPayments = TossPayments(clientKey);

        // 3. 결제 위젯 객체 생성
        widgets = tossPayments.widgets({customerKey});

        // 4. 결제 금액 설정 (비동기)
        await widgets.setAmount({
            currency: "KRW",
            value: amountValue,
        });

        // 5. 결제 UI 및 약관 렌더링 (병렬 처리)
        // variantKey는 토스 관리자 콘솔에서 설정한 테마 키입니다.
        await Promise.all([
            widgets.renderPaymentMethods({
                selector: "#payment-method",
                variantKey: "DEFAULT",
            }),
            widgets.renderAgreement({
                selector: "#agreement",
                variantKey: "AGREEMENT",
            }),
        ]);

        document.getElementById("payment-button").style.display = "block";
        document.getElementById("ready-button").style.display = "none";
    });

    document.getElementById("payment-button").addEventListener("click", async () => {
        const userId = document.getElementById("userId").value;
        const orderName = "배달 주문 상품 외";

        // 6. 결제 요청 (인증 성공 시 successUrl로 이동)
        try {
            await widgets.requestPayment({
                orderId: "ORDER_" + new Date().getTime(), // 매번 고유한 주문 ID
                orderName: orderName,
                successUrl: window.location.origin + "/payment/success.html?userId=" + userId,
                failUrl: window.location.origin + "/payment/fail.html",
                customerEmail: "user@example.com",
                customerName: "홍길동"
            });
        } catch (error) {
            console.error("결제 요청 중 에러 발생:", error);
        }
    });
</script>
</body>
</html>
