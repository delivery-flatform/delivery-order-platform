<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문 취소 API 테스트</title>
    <style>
        .test-container {
            width: 400px;
            margin: 50px auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            font-family: 'Pretendard', sans-serif;
            background: #fff;
        }

        h2 {
            color: #333;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #666;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #3182f6; /* 토스 블루 스타일 */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #1b64da;
        }

        #result-log {
            margin-top: 20px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
            font-size: 13px;
            white-space: pre-wrap;
            display: none;
        }
    </style>
</head>
<body>

<div class="test-container">
    <h2>주문 취소 테스트</h2>

    <div class="input-group">
        <label>주문 ID (orderId)</label>
        <input type="text" id="orderIdInput" placeholder="UUID를 입력하세요">
    </div>

    <div class="input-group">
        <label>사용자 ID (userId)</label>
        <input type="text" id="userIdInput" placeholder="사용자명을 입력하세요">
    </div>

    <button id="submitBtn">주문 취소 요청</button>

    <div id="result-log"></div>
</div>

<script>
    document.getElementById('submitBtn').addEventListener('click', async () => {
        const orderId = document.getElementById('orderIdInput').value;
        const userId = document.getElementById('userIdInput').value;
        const logBox = document.getElementById('result-log');

        if (!orderId || !userId) {
            alert("모든 값을 입력해주세요.");
            return;
        }

        // 로딩 표시
        logBox.style.display = "block";
        logBox.innerText = "취소 처리 중...";
        logBox.style.color = "#333";

        try {
            // 주소값 구성: @PatchMapping("/{orderId}/cancel") + @RequestParam userId
            const targetUrl = `/api/v1/orders/${orderId}/cancel?userId=${encodeURIComponent(userId)}`;

            const response = await fetch(targetUrl, {
                method: "PATCH", // 컨트롤러의 @PatchMapping과 일치
                headers: {
                    "Content-Type": "application/json"
                }
            });

            const result = await response.json();

            if (response.ok && (result.success === true || result.status === "SUCCESS" || !result.error)) {
                logBox.style.color = "#007aff";
                logBox.innerText = `[성공]\n${result.message}\n결과 데이터: ${JSON.stringify(result.data, null, 2)}`;
            } else {
                logBox.style.color = "#ff3b30";
                logBox.innerText = `[실패]\n사유: ${result.message || "서버 에러 발생"}`;
            }
        } catch (error) {
            logBox.style.color = "#ff3b30";
            logBox.innerText = `[통신 에러]\n${error.message}`;
        }
    });
</script>

</body>
</html>
